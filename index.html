<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Vantg Leads</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #09090E;
            --gold: #C9A855;
            --white: #FFFFFF;
            --body: #A0AAB8;
            --card: #111118;
            --card-hover: #16161F;
            --border: #1E1E2C;
        }
        * { -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--white); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }

        .card { background: var(--card); border: 1px solid var(--border); }

        .badge-p1 { background: rgba(201,168,85,0.12); color: #C9A855; border: 1px solid rgba(201,168,85,0.25); }
        .badge-p2 { background: rgba(96,165,250,0.12); color: #60A5FA; border: 1px solid rgba(96,165,250,0.25); }
        .badge-p3 { background: rgba(107,114,128,0.12); color: #9CA3AF; border: 1px solid rgba(107,114,128,0.25); }
        .badge-contacted { background: rgba(74,222,128,0.1); color: #4ADE80; border: 1px solid rgba(74,222,128,0.25); }

        .btn-gold { background: var(--gold); color: #09090E; font-weight: 600; transition: opacity 0.15s; }
        .btn-gold:active { opacity: 0.8; }
        .btn-outline { border: 1px solid var(--border); color: var(--body); transition: border-color 0.15s, color 0.15s; }
        .btn-outline:active { border-color: var(--gold); color: var(--gold); }

        .filter-active { border-color: var(--gold) !important; color: var(--gold) !important; }

        .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 50; backdrop-filter: blur(4px); }
        .modal-backdrop.open { display: flex; align-items: flex-end; justify-content: center; }
        @media (min-width: 768px) { .modal-backdrop.open { align-items: center; } }

        .modal-sheet { width: 100%; max-width: 540px; background: var(--card); border: 1px solid var(--border); border-radius: 24px 24px 0 0; padding: 20px; max-height: 92vh; overflow-y: auto; }
        @media (min-width: 768px) { .modal-sheet { border-radius: 20px; margin: 16px; } }

        input, textarea, select {
            background: #0D0D16;
            border: 1px solid var(--border);
            color: var(--white);
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 14px;
            transition: border-color 0.15s;
        }
        input:focus, textarea:focus, select:focus { outline: none; border-color: var(--gold); }
        select option { background: #111118; }
        ::placeholder { color: #4B5563; }

        .dm-box { background: #0A0A12; border: 1px solid var(--border); border-radius: 12px; padding: 16px; color: #E5E7EB; font-size: 14px; line-height: 1.65; white-space: pre-wrap; min-height: 80px; }

        .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .stats-bar { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 2px; }
        .stat { display: flex; flex-direction: column; align-items: center; min-width: 56px; }
        .stat-num { font-size: 18px; font-weight: 700; color: var(--white); line-height: 1; }
        .stat-label { font-size: 10px; color: var(--body); margin-top: 2px; }

        .link-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; color: var(--body); font-size: 13px; text-decoration: none; border-bottom: 1px solid var(--border); }
        .link-row:last-child { border-bottom: none; }
        .link-row svg { flex-shrink: 0; }
        .link-row:active { color: var(--gold); }

        .priority-reason-tag { background: rgba(201,168,85,0.07); border: 1px solid rgba(201,168,85,0.15); border-radius: 8px; padding: 6px 10px; font-size: 12px; color: #C9A855; }

        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1A1A24; border: 1px solid var(--border); color: var(--white); padding: 10px 20px; border-radius: 999px; font-size: 13px; z-index: 100; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
        .toast.show { opacity: 1; }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        #leads-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        @media (min-width: 640px) { #leads-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { #leads-grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body class="min-h-screen">

<!-- Header -->
<header style="position: sticky; top: 0; z-index: 40; background: rgba(9,9,14,0.96); backdrop-filter: blur(12px); border-bottom: 1px solid #1E1E2C;">
    <div style="max-width: 1100px; margin: 0 auto; padding: 12px 16px;">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
            <div>
                <span style="font-weight: 800; font-size: 18px; color: #C9A855; letter-spacing: 2px;">VANTG</span>
                <span style="font-size: 11px; color: #A0AAB8; margin-left: 6px; letter-spacing: 1px; text-transform: uppercase;">Leads</span>
            </div>
            <div style="display: flex; align-items: center; gap: 8px;">
                <a href="/api/export" style="color: #A0AAB8; font-size: 12px; text-decoration: none; padding: 6px 10px; border: 1px solid #1E1E2C; border-radius: 8px;">Export CSV</a>
                <button onclick="openImportModal()" style="color: #A0AAB8; font-size: 12px; padding: 6px 10px; border: 1px solid #1E1E2C; border-radius: 8px; background: none; cursor: pointer;">Import</button>
                <button onclick="openAddModal()" class="btn-gold" style="padding: 7px 14px; border-radius: 10px; font-size: 13px; border: none; cursor: pointer;">+ Add Lead</button>
            </div>
        </div>
        <!-- Stats row -->
        <div class="stats-bar scrollbar-hide" id="stats-bar">
            <div class="stat"><span class="stat-num" id="stat-total">—</span><span class="stat-label">Total</span></div>
            <div style="width: 1px; background: #1E1E2C; margin: 0 4px;"></div>
            <div class="stat"><span class="stat-num" style="color: #C9A855;" id="stat-p1">—</span><span class="stat-label">Running Ads</span></div>
            <div class="stat"><span class="stat-num" style="color: #60A5FA;" id="stat-p2">—</span><span class="stat-label">Organic</span></div>
            <div class="stat"><span class="stat-num" style="color: #9CA3AF;" id="stat-p3">—</span><span class="stat-label">Low Presence</span></div>
            <div style="width: 1px; background: #1E1E2C; margin: 0 4px;"></div>
            <div class="stat"><span class="stat-num" style="color: #4ADE80;" id="stat-contacted">—</span><span class="stat-label">Contacted</span></div>
        </div>
    </div>
</header>

<!-- Filter bar -->
<div style="position: sticky; top: 106px; z-index: 30; background: rgba(9,9,14,0.96); backdrop-filter: blur(12px); border-bottom: 1px solid #1E1E2C;">
    <div style="max-width: 1100px; margin: 0 auto; padding: 10px 16px;">
        <input type="text" id="search-input" placeholder="Search business, city, or type…"
               style="width: 100%; margin-bottom: 10px; box-sizing: border-box;"
               oninput="filterLeads()">
        <div style="display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px;" class="scrollbar-hide">
            <button class="filter-btn btn-outline filter-active" style="padding: 6px 14px; border-radius: 999px; font-size: 12px; white-space: nowrap; cursor: pointer; background: none;" data-filter="all" onclick="setFilter('all', this)">All</button>
            <button class="filter-btn btn-outline" style="padding: 6px 14px; border-radius: 999px; font-size: 12px; white-space: nowrap; cursor: pointer; background: none;" data-filter="priority:1" onclick="setFilter('priority:1', this)">🔥 Running Ads</button>
            <button class="filter-btn btn-outline" style="padding: 6px 14px; border-radius: 999px; font-size: 12px; white-space: nowrap; cursor: pointer; background: none;" data-filter="priority:2" onclick="setFilter('priority:2', this)">📱 Organic</button>
            <button class="filter-btn btn-outline" style="padding: 6px 14px; border-radius: 999px; font-size: 12px; white-space: nowrap; cursor: pointer; background: none;" data-filter="priority:3" onclick="setFilter('priority:3', this)">💤 Low Presence</button>
            <button class="filter-btn btn-outline" style="padding: 6px 14px; border-radius: 999px; font-size: 12px; white-space: nowrap; cursor: pointer; background: none;" data-filter="not-contacted" onclick="setFilter('not-contacted', this)">📬 Not Contacted</button>
            <button class="filter-btn btn-outline" style="padding: 6px 14px; border-radius: 999px; font-size: 12px; white-space: nowrap; cursor: pointer; background: none;" data-filter="contacted" onclick="setFilter('contacted', this)">✓ Contacted</button>
        </div>
    </div>
</div>

<!-- Lead Grid -->
<main style="max-width: 1100px; margin: 0 auto; padding: 16px;">
    <div id="leads-grid"></div>
    <div id="empty-state" style="display: none; text-align: center; padding: 64px 16px; color: #A0AAB8;">
        <div style="font-size: 40px; margin-bottom: 12px;">🔍</div>
        <div style="font-size: 15px; font-weight: 600; margin-bottom: 6px;">No leads here</div>
        <div style="font-size: 13px;">Try a different filter or add leads manually</div>
    </div>
    <div id="loading-state" style="text-align: center; padding: 64px 16px; color: #A0AAB8;">
        <div class="spinner" style="margin: 0 auto 12px;"></div>
        <div style="font-size: 14px;">Loading leads…</div>
    </div>
</main>

<!-- DM Modal -->
<div id="dm-modal" class="modal-backdrop">
    <div class="modal-sheet">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
            <div>
                <div style="font-size: 11px; color: #A0AAB8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px;">Cold DM</div>
                <h3 style="font-weight: 700; font-size: 16px; margin: 0;" id="dm-modal-title">—</h3>
            </div>
            <button onclick="closeDmModal()" style="color: #A0AAB8; font-size: 20px; background: none; border: none; cursor: pointer; padding: 4px;">✕</button>
        </div>
        <div id="dm-loading" style="display: none; text-align: center; padding: 32px;">
            <div class="spinner" style="margin: 0 auto 12px;"></div>
            <div style="font-size: 13px; color: #A0AAB8;">Writing your DM…</div>
        </div>
        <div id="dm-content" class="dm-box"></div>
        <div style="display: flex; gap: 8px; margin-top: 12px;">
            <button onclick="copyDm()" class="btn-gold" style="flex: 1; padding: 12px; border-radius: 12px; font-size: 14px; border: none; cursor: pointer;" id="copy-btn">Copy</button>
            <button onclick="regenerateDm()" class="btn-outline" style="flex: 1; padding: 12px; border-radius: 12px; font-size: 14px; cursor: pointer; background: none;">Regenerate</button>
        </div>
    </div>
</div>

<!-- Notes Modal -->
<div id="notes-modal" class="modal-backdrop">
    <div class="modal-sheet">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
            <h3 style="font-weight: 700; font-size: 16px; margin: 0;" id="notes-modal-title">Notes</h3>
            <button onclick="closeNotesModal()" style="color: #A0AAB8; font-size: 20px; background: none; border: none; cursor: pointer;">✕</button>
        </div>
        <textarea id="notes-input" style="width: 100%; height: 128px; box-sizing: border-box; resize: none;" placeholder="Add your notes about this lead…"></textarea>
        <button onclick="saveNotes()" class="btn-gold" style="width: 100%; padding: 12px; border-radius: 12px; font-size: 14px; border: none; cursor: pointer; margin-top: 12px;">Save Notes</button>
    </div>
</div>

<!-- Add Lead Modal -->
<div id="add-modal" class="modal-backdrop">
    <div class="modal-sheet">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
            <h3 style="font-weight: 700; font-size: 16px; margin: 0;">Add Lead</h3>
            <button onclick="closeAddModal()" style="color: #A0AAB8; font-size: 20px; background: none; border: none; cursor: pointer;">✕</button>
        </div>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <input id="add-name" style="width: 100%; box-sizing: border-box;" placeholder="Business name *">
            <select id="add-type" style="width: 100%; box-sizing: border-box;">
                <option value="">Business type</option>
                <option>Med Spa</option>
                <option>Cosmetic Surgery</option>
                <option>Aesthetic Clinic</option>
                <option>Plastic Surgery</option>
                <option>Cosmetic Dentistry</option>
                <option>Wellness Studio</option>
                <option>IV Therapy</option>
                <option>Other</option>
            </select>
            <input id="add-city" style="width: 100%; box-sizing: border-box;" placeholder="City (e.g. Beverly Hills)">
            <input id="add-phone" style="width: 100%; box-sizing: border-box;" placeholder="Phone number">
            <input id="add-website" style="width: 100%; box-sizing: border-box;" placeholder="Website URL">
            <input id="add-instagram" style="width: 100%; box-sizing: border-box;" placeholder="Instagram (@handle or full URL)">
            <select id="add-ad-status" style="width: 100%; box-sizing: border-box;">
                <option value="unknown">Ad status — unknown</option>
                <option value="running_ads">Running paid ads</option>
                <option value="organic_only">Organic only, no ads</option>
                <option value="no_presence">No online presence</option>
            </select>
            <select id="add-priority" style="width: 100%; box-sizing: border-box;">
                <option value="1">Priority 1 — Running Ads 🔥</option>
                <option value="2">Priority 2 — Organic Only 📱</option>
                <option value="3" selected>Priority 3 — Low Presence 💤</option>
            </select>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input id="add-rating" style="box-sizing: border-box;" placeholder="Rating (e.g. 4.8)" type="number" step="0.1" min="1" max="5">
                <input id="add-reviews" style="box-sizing: border-box;" placeholder="Review count" type="number">
            </div>
        </div>
        <button onclick="submitAddLead()" class="btn-gold" style="width: 100%; padding: 12px; border-radius: 12px; font-size: 14px; border: none; cursor: pointer; margin-top: 14px;">Add Lead</button>
    </div>
</div>

<!-- Import Modal -->
<div id="import-modal" class="modal-backdrop">
    <div class="modal-sheet">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
            <h3 style="font-weight: 700; font-size: 16px; margin: 0;">Import Leads</h3>
            <button onclick="closeImportModal()" style="color: #A0AAB8; font-size: 20px; background: none; border: none; cursor: pointer;">✕</button>
        </div>
        <div style="font-size: 12px; color: #A0AAB8; margin-bottom: 10px;">Paste a JSON array of leads. Each lead needs at minimum a <code style="color: #C9A855;">business_name</code>.</div>
        <textarea id="import-input" style="width: 100%; height: 200px; box-sizing: border-box; resize: none; font-size: 12px; font-family: monospace;" placeholder='[{"business_name": "Example Spa", "city": "Beverly Hills", "priority": 1}]'></textarea>
        <div id="import-result" style="font-size: 13px; color: #4ADE80; margin-top: 8px; display: none;"></div>
        <button onclick="submitImport()" class="btn-gold" style="width: 100%; padding: 12px; border-radius: 12px; font-size: 14px; border: none; cursor: pointer; margin-top: 12px;">Import</button>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
    let allLeads = [];
    let currentFilter = 'all';
    let currentSearch = '';
    let currentDmLeadId = null;
    let currentNotesLeadId = null;

    function showToast(msg, duration = 2000) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), duration);
    }

    async function loadStats() {
        const res = await fetch('/api/stats');
        const s = await res.json();
        document.getElementById('stat-total').textContent = s.total;
        document.getElementById('stat-p1').textContent = s.p1;
        document.getElementById('stat-p2').textContent = s.p2;
        document.getElementById('stat-p3').textContent = s.p3;
        document.getElementById('stat-contacted').textContent = s.contacted;
    }

    async function loadLeads() {
        document.getElementById('loading-state').style.display = 'block';
        document.getElementById('leads-grid').innerHTML = '';
        const res = await fetch('/api/leads');
        allLeads = await res.json();
        document.getElementById('loading-state').style.display = 'none';
        renderLeads();
        loadStats();
    }

    function renderLeads() {
        const grid = document.getElementById('leads-grid');
        const empty = document.getElementById('empty-state');

        let filtered = allLeads;

        if (currentSearch) {
            const q = currentSearch.toLowerCase();
            filtered = filtered.filter(l =>
                (l.business_name || '').toLowerCase().includes(q) ||
                (l.city || '').toLowerCase().includes(q) ||
                (l.business_type || '').toLowerCase().includes(q)
            );
        }

        if (currentFilter === 'priority:1') filtered = filtered.filter(l => l.priority == 1);
        else if (currentFilter === 'priority:2') filtered = filtered.filter(l => l.priority == 2);
        else if (currentFilter === 'priority:3') filtered = filtered.filter(l => l.priority == 3);
        else if (currentFilter === 'contacted') filtered = filtered.filter(l => l.contacted);
        else if (currentFilter === 'not-contacted') filtered = filtered.filter(l => !l.contacted);

        if (filtered.length === 0) {
            grid.innerHTML = '';
            empty.style.display = 'block';
            return;
        }

        empty.style.display = 'none';
        grid.innerHTML = filtered.map(renderCard).join('');
    }

    function renderCard(lead) {
        const badges = {
            1: '<span class="badge-p1" style="padding: 3px 8px; border-radius: 999px; font-size: 11px; font-weight: 600;">🔥 Running Ads</span>',
            2: '<span class="badge-p2" style="padding: 3px 8px; border-radius: 999px; font-size: 11px; font-weight: 600;">📱 Organic</span>',
            3: '<span class="badge-p3" style="padding: 3px 8px; border-radius: 999px; font-size: 11px; font-weight: 600;">💤 Low Presence</span>',
        };
        const priorityBadge = badges[lead.priority] || badges[3];
        const contactedBadge = lead.contacted
            ? '<span class="badge-contacted" style="padding: 3px 8px; border-radius: 999px; font-size: 11px; font-weight: 600;">✓ Contacted</span>'
            : '';

        const rating = lead.rating
            ? `<span style="font-size: 12px; color: #A0AAB8;">⭐ ${lead.rating}${lead.review_count ? ` (${Number(lead.review_count).toLocaleString()})` : ''}</span>`
            : '';
        const city = lead.city
            ? `<span style="font-size: 12px; color: #A0AAB8;">📍 ${lead.city}, CA</span>`
            : '';

        function igUrl(ig) {
            if (!ig) return null;
            if (ig.startsWith('http')) return ig;
            return `https://instagram.com/${ig.replace('@', '')}`;
        }
        function igHandle(ig) {
            if (!ig) return null;
            return ig.startsWith('http') ? ig.replace(/https?:\/\/(www\.)?instagram\.com\//, '@').replace(/\/$/, '') : (ig.startsWith('@') ? ig : '@' + ig);
        }

        const ig = igUrl(lead.instagram);
        const site = lead.website ? (lead.website.startsWith('http') ? lead.website : 'https://' + lead.website) : null;
        const siteLabel = site ? site.replace(/^https?:\/\//, '').replace(/\/$/, '') : null;

        const adLibUrl = `https://www.facebook.com/ads/library/?active_status=active&ad_type=all&country=US&q=${encodeURIComponent(lead.business_name)}&search_type=keyword_unordered`;

        const hasDm = !!lead.dm_generated;

        return `<div class="card" style="border-radius: 18px; padding: 16px; display: flex; flex-direction: column; gap: 12px;">
            <!-- Top row: badges + name -->
            <div>
                <div style="display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px;">
                    ${priorityBadge}${contactedBadge}
                </div>
                <div style="font-weight: 700; font-size: 15px; line-height: 1.3;">${lead.business_name}</div>
                ${lead.business_type ? `<div style="font-size: 12px; color: #A0AAB8; margin-top: 3px;">${lead.business_type}</div>` : ''}
            </div>

            <!-- Meta row -->
            ${(rating || city) ? `<div style="display: flex; flex-wrap: wrap; gap: 10px;">${rating}${city}</div>` : ''}

            <!-- Priority reason -->
            ${lead.priority_reason ? `<div class="priority-reason-tag">${lead.priority_reason}</div>` : ''}

            <!-- Links -->
            <div style="border-top: 1px solid #1E1E2C; padding-top: 8px;">
                ${lead.phone ? `<a href="tel:${lead.phone}" class="link-row">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2.18h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.11 6.11l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7a2 2 0 0 1 1.72 2.06z"/></svg>
                    ${lead.phone}
                </a>` : ''}
                ${ig ? `<a href="${ig}" target="_blank" rel="noopener" class="link-row">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
                    ${igHandle(lead.instagram)}
                </a>` : ''}
                ${site ? `<a href="${site}" target="_blank" rel="noopener" class="link-row">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    ${siteLabel}
                </a>` : ''}
            </div>

            <!-- Action buttons -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <a href="${adLibUrl}" target="_blank" rel="noopener" class="btn-outline" style="padding: 10px 8px; border-radius: 10px; font-size: 12px; text-align: center; text-decoration: none; display: block;">Check Ads 🔎</a>
                <button onclick="openDmModal(${lead.id})" class="btn-gold" style="padding: 10px 8px; border-radius: 10px; font-size: 12px; border: none; cursor: pointer;">
                    ${hasDm ? 'View DM ✓' : 'Generate DM'}
                </button>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <button onclick="toggleContacted(${lead.id})" class="btn-outline ${lead.contacted ? 'filter-active' : ''}" style="padding: 10px 8px; border-radius: 10px; font-size: 12px; cursor: pointer; background: none;">
                    ${lead.contacted ? '✓ Contacted' : 'Mark Contacted'}
                </button>
                <button onclick="openNotesModal(${lead.id})" class="btn-outline" style="padding: 10px 8px; border-radius: 10px; font-size: 12px; cursor: pointer; background: none;">
                    ${lead.notes ? '📝 Notes' : '📝 Add Note'}
                </button>
            </div>
        </div>`;
    }

    function setFilter(filter, btn) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('filter-active'));
        btn.classList.add('filter-active');
        renderLeads();
    }

    function filterLeads() {
        currentSearch = document.getElementById('search-input').value;
        renderLeads();
    }

    async function openDmModal(leadId) {
        currentDmLeadId = leadId;
        const lead = allLeads.find(l => l.id === leadId);
        document.getElementById('dm-modal-title').textContent = lead.business_name;
        document.getElementById('dm-modal').classList.add('open');

        if (lead.dm_generated) {
            document.getElementById('dm-loading').style.display = 'none';
            document.getElementById('dm-content').style.display = 'block';
            document.getElementById('dm-content').textContent = lead.dm_generated;
        } else {
            await fetchDm(leadId);
        }
    }

    async function fetchDm(leadId) {
        document.getElementById('dm-loading').style.display = 'block';
        document.getElementById('dm-content').style.display = 'none';

        const res = await fetch(`/api/leads/${leadId}/dm`, { method: 'POST' });
        const data = await res.json();

        document.getElementById('dm-loading').style.display = 'none';
        document.getElementById('dm-content').style.display = 'block';

        if (data.error) {
            document.getElementById('dm-content').textContent = 'Error: ' + data.error;
            return;
        }

        document.getElementById('dm-content').textContent = data.dm;

        const lead = allLeads.find(l => l.id === leadId);
        if (lead) lead.dm_generated = data.dm;
    }

    async function regenerateDm() {
        if (!currentDmLeadId) return;
        const lead = allLeads.find(l => l.id === currentDmLeadId);
        if (lead) lead.dm_generated = null;
        await fetchDm(currentDmLeadId);
        renderLeads();
    }

    function closeDmModal() {
        document.getElementById('dm-modal').classList.remove('open');
        currentDmLeadId = null;
        renderLeads();
    }

    function copyDm() {
        const text = document.getElementById('dm-content').textContent;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.getElementById('copy-btn');
            btn.textContent = 'Copied ✓';
            setTimeout(() => btn.textContent = 'Copy', 2000);
        });
    }

    async function toggleContacted(leadId) {
        const lead = allLeads.find(l => l.id === leadId);
        lead.contacted = !lead.contacted;

        await fetch(`/api/leads/${leadId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contacted: lead.contacted })
        });

        renderLeads();
        loadStats();
        showToast(lead.contacted ? '✓ Marked as contacted' : 'Marked as not contacted');
    }

    function openNotesModal(leadId) {
        currentNotesLeadId = leadId;
        const lead = allLeads.find(l => l.id === leadId);
        document.getElementById('notes-modal-title').textContent = lead.business_name;
        document.getElementById('notes-input').value = lead.notes || '';
        document.getElementById('notes-modal').classList.add('open');
    }

    async function saveNotes() {
        const notes = document.getElementById('notes-input').value;
        const lead = allLeads.find(l => l.id === currentNotesLeadId);
        lead.notes = notes;

        await fetch(`/api/leads/${currentNotesLeadId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ notes })
        });

        closeNotesModal();
        renderLeads();
        showToast('Notes saved');
    }

    function closeNotesModal() {
        document.getElementById('notes-modal').classList.remove('open');
        currentNotesLeadId = null;
    }

    function openAddModal() { document.getElementById('add-modal').classList.add('open'); }
    function closeAddModal() { document.getElementById('add-modal').classList.remove('open'); }
    function openImportModal() { document.getElementById('import-modal').classList.add('open'); }
    function closeImportModal() { document.getElementById('import-modal').classList.remove('open'); }

    async function submitAddLead() {
        const name = document.getElementById('add-name').value.trim();
        if (!name) { showToast('Business name is required'); return; }

        const priority = parseInt(document.getElementById('add-priority').value);
        const data = {
            business_name: name,
            business_type: document.getElementById('add-type').value,
            city: document.getElementById('add-city').value,
            phone: document.getElementById('add-phone').value,
            website: document.getElementById('add-website').value,
            instagram: document.getElementById('add-instagram').value,
            ad_status: document.getElementById('add-ad-status').value,
            priority,
            rating: parseFloat(document.getElementById('add-rating').value) || null,
            review_count: parseInt(document.getElementById('add-reviews').value) || null,
        };

        const res = await fetch('/api/leads', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        if (res.status === 409) { showToast('Lead already exists'); return; }

        closeAddModal();
        document.getElementById('add-name').value = '';
        await loadLeads();
        showToast('Lead added');
    }

    async function submitImport() {
        const raw = document.getElementById('import-input').value.trim();
        let leads;
        try {
            leads = JSON.parse(raw);
            if (!Array.isArray(leads)) leads = [leads];
        } catch (e) {
            showToast('Invalid JSON — check your format');
            return;
        }

        const res = await fetch('/api/import', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ leads })
        });
        const data = await res.json();

        const result = document.getElementById('import-result');
        result.textContent = `✓ Imported ${data.imported} leads (${data.skipped} skipped as duplicates)`;
        result.style.display = 'block';

        await loadLeads();
        setTimeout(() => {
            closeImportModal();
            result.style.display = 'none';
            document.getElementById('import-input').value = '';
        }, 2000);
    }

    // Close on backdrop click
    document.querySelectorAll('.modal-backdrop').forEach(modal => {
        modal.addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('open');
        });
    });

    loadLeads();
</script>
</body>
</html>
